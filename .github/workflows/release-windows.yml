name: Build and Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: mvn -q -DskipTests clean package

      - name: Resolve app version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag.StartsWith("v")) { $tag = $tag.Substring(1) }
          "app_version=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build EXE
        shell: pwsh
        working-directory: backend
        run: |
          ./build-exe.ps1 -AppVersion "${{ steps.version.outputs.app_version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reminot-windows
          path: backend/dist/**

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            backend/dist/*.exe
            backend/dist/*portable.zip
