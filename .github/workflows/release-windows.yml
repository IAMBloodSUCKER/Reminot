name: Build and Release Windows

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "Release version (for example 1.0.15)"
        required: true
        default: "1.0.15"
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: mvn -q -DskipTests clean package

      - name: Resolve app version
        id: version
        shell: pwsh
        run: |
          $manualVersion = "${{ github.event.inputs.app_version }}"
          if (-not [string]::IsNullOrWhiteSpace($manualVersion)) {
            $resolvedVersion = $manualVersion
          } else {
            $refName = "${{ github.ref_name }}"
            if ($refName.StartsWith("v")) { $refName = $refName.Substring(1) }
            $resolvedVersion = $refName
          }
          if ($resolvedVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid app version: $resolvedVersion"
          }
          "app_version=$resolvedVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build EXE
        shell: pwsh
        working-directory: backend
        run: |
          ./build-exe.ps1 -AppVersion "${{ steps.version.outputs.app_version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reminot-windows
          path: backend/dist/**

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.app_version }}
          name: v${{ steps.version.outputs.app_version }}
          target_commitish: ${{ github.sha }}
          files: |
            backend/dist/*.exe
            backend/dist/*portable.zip
